<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compound Interest Calculator</title>
    <style>
        /* Pure internal CSS styling - Requires zero internet */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: #f1f5f9; color: #334155; min-h: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; min-height: 100vh; }
        .container { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); width: 100%; max-width: 900px; display: grid; grid-template-columns: 1fr; gap: 30px; }
        @media (min-width: 768px) { .container { grid-template-columns: 1fr 1fr; } }
        h2 { color: #4f46e5; margin-bottom: 20px; font-size: 24px; font-weight: 700; }
        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 14px; font-weight: 600; color: #475569; margin-bottom: 6px; }
        input, select { width: 100%; padding: 10px 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 15px; outline: none; transition: border 0.2s; }
        input:focus, select:focus { border-color: #4f46e5; }
        button { w-full; width: 100%; background: #4f46e5; color: white; border: none; padding: 12px; font-size: 16px; font-weight: 700; border-radius: 8px; cursor: pointer; transition: background 0.2s; margin-top: 10px; }
        button:hover { background: #4338ca; }
        .result-box { margin-top: 24px; padding: 16px; background: #eef2ff; border: 1px solid #e0e7ff; border-radius: 12px; }
        .result-title { font-size: 14px; font-weight: 500; color: #3730a3; }
        .result-value { font-size: 28px; font-weight: 800; color: #4338ca; margin-top: 4px; }
        .chart-box { display: flex; flex-direction: column; justify-content: center; align-items: center; background: #fafafa; border: 1px dashed #cbd5e1; border-radius: 12px; padding: 15px; position: relative; min-height: 320px; }
        canvas { width: 100% !important; height: 100% !important; max-height: 280px; }
    </style>
</head>
<body>

    <div class="container">
        <!-- Inputs & Results Section -->
        <div>
            <h2>Compound Interest Calculator</h2>
            <form id="calcForm">
                <div class="form-group">
                    <label>Principal Amount ($)</label>
                    <input type="number" id="principal" value="10000" min="0" required>
                </div>
                <div class="form-group">
                    <label>Annual Interest Rate (%)</label>
                    <input type="number" id="rate" value="8" step="0.1" min="0" required>
                </div>
                <div class="form-group">
                    <label>Time Period (Years)</label>
                    <input type="number" id="time" value="10" min="1" required>
                </div>
                <div class="form-group">
                    <label>Compounding Frequency</label>
                    <select id="frequency">
                        <option value="1">Annually (1/yr)</option>
                        <option value="4">Quarterly (4/yr)</option>
                        <option value="12" selected>Monthly (12/yr)</option>
                        <option value="365">Daily (365/yr)</option>
                    </select>
                </div>
                <button type="submit">Calculate Growth</button>
            </form>

            <div class="result-box">
                <p class="result-title">Future Balance:</p>
                <p id="totalBalance" class="result-value">$10,000.00</p>
            </div>
        </div>

        <!-- Self-Drawing Native Chart Section -->
        <div class="chart-box">
            <canvas id="nativeChart" width="400" height="280"></canvas>
        </div>
    </div>

    <script>
        const form = document.getElementById('calcForm');
        const totalBalanceDisplay = document.getElementById('totalBalance');
        const canvas = document.getElementById('nativeChart');
        const ctx = canvas.getContext('2d');

        // Vanilla JavaScript Custom Canvas Drawing Function (No library required)
        function drawExponentialChart(data) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const padding = 40;
            const graphWidth = canvas.width - padding * 2;
            const graphHeight = canvas.height - padding * 2;
            
            const maxVal = Math.max(...data) * 1.1;
            const minVal = 0;
            
            // Draw Axis Lines
            ctx.strokeStyle = '#cbd5e1';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(padding, padding);
            ctx.lineTo(padding, canvas.height - padding);
            ctx.lineTo(canvas.width - padding, canvas.height - padding);
            ctx.stroke();

            // Calculate point coordinates
            const points = data.map((val, index) => {
                const x = padding + (index / (data.length - 1)) * graphWidth;
                const y = (canvas.height - padding) - ((val - minVal) / (maxVal - minVal)) * graphHeight;
                return { x, y };
            });

            // Draw Area Fill Under Curve Line
            ctx.fillStyle = 'rgba(79, 70, 229, 0.1)';
            ctx.beginPath();
            ctx.moveTo(padding, canvas.height - padding);
            points.forEach(p => ctx.lineTo(p.x, p.y));
            ctx.lineTo(points[points.length - 1].x, canvas.height - padding);
            ctx.closePath();
            ctx.fill();

            // Draw Exponential Curve Line
            ctx.strokeStyle = '#4f46e5';
            ctx.lineWidth = 3;
            ctx.beginPath();
            points.forEach((p, i) => {
                if (i === 0) ctx.moveTo(p.x, p.y);
                else ctx.lineTo(p.x, p.y);
            });
            ctx.stroke();

            // Draw Data Points
            ctx.fillStyle = '#4338ca';
            points.forEach((p, i) => {
                if (i === 0 || i === points.length - 1 || points.length <= 11) {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
                    ctx.fill();
                }
            });

            // Add Labels text
            ctx.fillStyle = '#64748b';
            ctx.font = '10px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('Year 0', padding, canvas.height - padding + 15);
            ctx.fillText(`Year ${data.length - 1}`, canvas.width - padding, canvas.height - padding + 15);
            
            ctx.textAlign = 'right';
            ctx.fillText('$' + Math.round(data[data.length - 1]), padding - 5, points[points.length - 1].y + 4);
            ctx.fillText('$' + Math.round(data[0]), padding - 5, points[0].y + 4);
        }

        function calculateCompoundInterest(e) {
            if (e) e.preventDefault();

            const P = parseFloat(document.getElementById('principal').value);
            const r = parseFloat(document.getElementById('rate').value) / 100;
            const t = parseInt(document.getElementById('time').value);
            const n = parseInt(document.getElementById('frequency').value);

            let data = [];

            for (let year = 0; year <= t; year++) {
                const amount = P * Math.pow((1 + r / n), n * year);
                data.push(amount);
            }

            // Update Currency Text
            totalBalanceDisplay.textContent = new Intl.NumberFormat('en-US', {
                style: 'currency', currency: 'USD'
            }).format(data[data.length - 1]);

            // Draw Curve Graphic
            drawExponentialChart(data);
        }

        form.addEventListener('submit', calculateCompoundInterest);
        calculateCompoundInterest();
    </script>
</body>
</html>
